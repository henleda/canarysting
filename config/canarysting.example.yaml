# Example operator configuration. See docs/ENGINE.md, docs/SCOPE.md, docs/STING.md.

# Per-tier strictness: target false-positive rate, 0.01 (permissive) .. 1.00 (strict).
# Higher = stricter. Low tiers tolerate more FP than high tiers, by design.
confidence_required:
  tier1: 0.30
  tier2: 0.60
  tier3: 0.90

# Enforcement mode for tiers 2-3. Tiers 0-1 are always async.
# async MUST enforce in the kernel.
mode:
  tier2: async
  tier3: inline

# Inline fail behavior per tier. Tier 1 fail-open, Tier 3 fail-closed.
fail_closed:
  tier1: false
  tier3: true

# Attrition aggressiveness FLOOR. Default conservative; aggressive is explicit.
# An unrecognized/empty value parses to passive (fail-safe), never to aggressive.
#   passive    -> slow-drip tarpit only
#   moderate   -> tarpit + plausible fake directory/config maze
#   aggressive -> + token-maximizing bait (the brand ceiling; explicit only)
sting_floor: passive

# Sting self-cost budget (attrition must not burn the defender). A zero/missing
# field normalizes to the documented conservative cap — never to "unbounded".
sting_budget:
  max_bytes_per_flow: 5242880      # 5 MiB per flow
  max_depth: 8                     # maze / nested-structure depth cap (iterative)
  max_duration_seconds: 120        # wall-time a single flow may be held
  global_ceiling_bytes: 524288000  # 500 MiB host-wide, enforced by the shared Governor
  max_concurrent_flows: 1024       # cap on simultaneously-tarpitted streams
                                   # (fd/goroutine-exhaustion guard; bytes alone do not bound it)

# Slow-drip pacing. The delay is returned to the driver as data (attrition never
# sleeps). min bounds the floor so a drip always imposes cost; max stays under the
# ~60s crawler-disconnect timeout so the attacker stays trapped, not released.
sting_drip:
  chunk_bytes: 64                  # per-drip chunk size for the tarpit
  min_ms: 2000                     # 2s
  max_ms: 45000                    # 45s

# Runtime kill switch. true trips the shared Governor at load so attrition is a
# no-op; canaryctl can flip it live, and the engine trips it on host pressure.
sting_kill: false

# Scope. Leave zones empty to use derived cluster identity. On environments with
# no derivable cluster identity (e.g. standalone nginx), boundary is REQUIRED or
# the engine refuses to start. Never falls back to a global scope.
scope:
  zones: []          # optional operator-defined trust zones (must not overlap)
  boundary: ""       # required only when no cluster identity is derivable

# Correlation window for scoring. Tight windows reduce false positives.
scoring:
  window_seconds: 300
  benign_exclusion:  # service accounts / monitoring / scheduled tasks
    - "system:serviceaccount:monitoring"

# Baseline weight multiplier (docs/BASELINE_MULTIPLIER.md). The per-scope eBPF
# baseline enters the score ONLY as a bounded multiplier on a canary touch:
# Score = base × M, M in [1, M_max]. It never triggers anything on its own, and
# it is forced to 1.0 while the scope is uncalibrated, the baseline is stale, or
# the current time bucket is sparse. These are documented inputs, not constants.
baseline:
  m_max: 3.0              # multiplier cap (asymptotic). Range 1.0..3.0. Conservative.
  k: 0.5                  # saturation knee: the deviation d at which g(d)=0.5
  c_max: 1.0              # per-feature contribution cap (bounded influence)
  time_bucket: dow_hour   # baseline conditioning: day-of-week × hour
  learning_window_days: 14 # must span a full weekly cycle (>= 2 weeks)

# M7 learning window (the persistent baseline-accrual path). The OBSERVE-ONLY
# eBPF flow-stats path feeds a per-(scope,bucket) baseline that drives M. These
# are the two gates M7 owns; M only amplifies when the scope is BOTH calibrated
# (analyst-feedback evidence floor) AND live+bucket-sufficient (this data floor).
observe:
  db_path: /var/lib/canarysting/baseline.db   # bbolt durable store; survives reboot
  cgroup: /sys/fs/cgroup                        # cgroup v2 mount to attach the observe programs; empty => observe disabled
  # Window bucketer: coarse (8 buckets = {weekday,weekend}×{night,morning,
  # afternoon,evening}) makes bucket-sufficiency reachable within a 2-week window;
  # graduate to the 168-bucket production default as more weeks accrue (D6).
  window_bucketer: true
  # The eBPF DATA FLOOR — how much REAL observed traffic a scope/bucket needs.
  # Distinct from the analyst evidence floor; neither gate can launder the other.
  # NOTE (M7): only max_coverage_gap_seconds is wired from config today (via the
  # engine -max-coverage-gap flag). The other fields below are the BUILT-IN
  # defaults documented for transparency; a YAML loader that reads them lands with
  # the operator control plane (ROADMAP M10). To tune them before then, change the
  # defaults in internal/engine/observebaseline/floor.go (DefaultDataFloor).
  data_floor:
    min_flows_per_bucket: 100        # completed flows a bucket needs
    min_identities_per_bucket: 2     # distinct source identities (a population, not one source)
    min_days_per_bucket: 3           # distinct calendar days a bucket must span
    min_p2_samples: 50               # min observations per continuous distribution summary
    min_sufficient_buckets: 4        # sufficient buckets a scope needs to go live
    min_calendar_days: 7             # distinct days the scope's data must span
    freshness_ttl_seconds: 900       # no fold within this => stale (M forced to 1.0)
    max_coverage_gap_seconds: 3600   # a downtime gap larger than this forces re-accrual on boot
