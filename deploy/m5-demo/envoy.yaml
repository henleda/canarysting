# M4 demo Envoy config: a host-networked ingress proxy that runs every request
# through the CanarySting ext_proc adapter, then routes to a backend service.
#
# The ext_proc filter sends request headers + the connection source/destination
# attributes to the adapter (so it can rebuild the 4-tuple and resolve the socket
# cookie via the sockops bridge), and applies the adapter's verdict inline. Body
# and response/trailers are skipped (M4 uses path/header canaries). See
# docs/ADAPTERS.md and docs/IDENTITY.md.
admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 9901 }

static_resources:
  listeners:
  - name: ingress
    address:
      socket_address: { address: 0.0.0.0, port_value: 8080 }
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress
          route_config:
            name: local
            virtual_hosts:
            - name: backend
              domains: ["*"]
              routes:
              - match: { prefix: "/" }
                route: { cluster: backend }
          http_filters:
          - name: envoy.filters.http.ext_proc
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
              grpc_service:
                envoy_grpc: { cluster_name: canarysting_extproc }
                # 10s, NOT 0.2s: an inline Tier-2/3 attrition verdict HOLDS the request
                # (tarpit + poisoned deception body) for up to AttritionMaxHold (8s); the
                # ext_proc stream must outlive that hold or Envoy 504s the attacker before
                # the bait is served. Must stay > the adapter's inline hold + the attrition
                # max hold (the demo box reuses this config to bleed the attacker).
                timeout: 10s
              failure_mode_allow: false   # adapter must be up; do NOT silently bypass
              message_timeout: 10s
              processing_mode:
                request_header_mode: SEND
                response_header_mode: SKIP
                request_body_mode: NONE
                response_body_mode: NONE
                request_trailer_mode: SKIP
                response_trailer_mode: SKIP
              # The connection 4-tuple the adapter rebuilds to resolve the cookie.
              request_attributes:
              - source.address
              - destination.address
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  - name: backend
    type: STRICT_DNS
    connect_timeout: 1s
    load_assignment:
      cluster_name: backend
      endpoints:
      - lb_endpoints:
        - endpoint:
            address: { socket_address: { address: 127.0.0.1, port_value: 8000 } }

  - name: canarysting_extproc
    type: STRICT_DNS
    connect_timeout: 1s
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}   # ext_proc is gRPC (HTTP/2)
    load_assignment:
      cluster_name: canarysting_extproc
      endpoints:
      - lb_endpoints:
        - endpoint:
            address: { socket_address: { address: 127.0.0.1, port_value: 50051 } }
