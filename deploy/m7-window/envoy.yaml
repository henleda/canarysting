# M7 window Envoy: host-networked ingress in front of the staged service mesh.
# Every request runs through the CanarySting ext_proc adapter (so canary touches
# become signals and the source address is carried for the staged labeler), then
# routes to the mesh frontend, which fans out east-west to api -> auth/db/cache.
#
# source.address is REQUIRED: the adapter rebuilds the 4-tuple from it (to resolve
# the socket cookie) AND stamps it into L7Attributes[canarysting.source_address]
# so the engine-side staged labeler can attribute a canary touch to the declared
# attacker identity. Body/response/trailers are skipped (M7 uses path canaries).
admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 9901 }

static_resources:
  listeners:
  - name: ingress
    address:
      socket_address: { address: 0.0.0.0, port_value: 8080 }
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress
          route_config:
            name: local
            virtual_hosts:
            - name: mesh
              domains: ["*"]
              routes:
              # Everything (normal application paths AND the negative-space canary
              # paths) flows to the mesh frontend; the ext_proc filter recognizes a
              # canary touch by its path before the route is taken.
              - match: { prefix: "/" }
                route: { cluster: frontend }
          http_filters:
          - name: envoy.filters.http.ext_proc
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
              grpc_service:
                envoy_grpc: { cluster_name: canarysting_extproc }
                # 10s (was 0.2s): the M6 attrition pump HOLDS an inline Tier 2/3
                # attacker request for a real tarpit duration before returning the
                # deception body. Envoy must wait that long for the ext_proc
                # response. Legit T0/T1 traffic still returns in ~50ms (no hold), so
                # normal latency is unaffected; this only extends how long Envoy
                # tolerates a held (attacker) response. The prober's own ~4s request
                # ctx ends the hold first, so Envoy never actually cuts it.
                timeout: 10s
              failure_mode_allow: false
              message_timeout: 10s
              processing_mode:
                request_header_mode: SEND
                response_header_mode: SKIP
                request_body_mode: NONE
                response_body_mode: NONE
                request_trailer_mode: SKIP
                response_trailer_mode: SKIP
              request_attributes:
              - source.address
              - destination.address
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  - name: frontend
    type: STRICT_DNS
    connect_timeout: 1s
    load_assignment:
      cluster_name: frontend
      endpoints:
      - lb_endpoints:
        - endpoint:
            address: { socket_address: { address: 127.0.0.1, port_value: 8001 } }

  - name: canarysting_extproc
    type: STRICT_DNS
    connect_timeout: 1s
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: canarysting_extproc
      endpoints:
      - lb_endpoints:
        - endpoint:
            address: { socket_address: { address: 127.0.0.1, port_value: 50051 } }
