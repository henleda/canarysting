# M7 window — server-box service mesh behind host-networked Envoy.
#
# A ~13-service mesh forms a real, multi-tier east-west FABRIC — not a flat hop.
# Each downstream call is a genuine service-to-service flow the observe path sees,
# so the baseline learns real internal adjacencies. The graph has a few tiers, some
# fan-out, and some shared dependencies (db, cache, db-replica, session-store), so
# the learned topology reads as a believable east-west fabric:
#
#   edge tier:    frontend -> {cdn-edge, api}
#                 cdn-edge -> api
#   app tier:     api      -> {auth, db, cache, payments, search}
#                 orders   -> {inventory, payments}
#                 profile  -> {session-store, cache}
#                 notifications -> session-store
#   service tier: auth     -> session-store
#                 payments -> ledger
#                 search   -> db-replica
#                 inventory-> db
#                 analytics -> {db-replica, cache}
#   data tier:    ledger     -> db
#                 db-replica -> cache
#                 auth, db, cache, session-store are shared leaves/deps
#
# Reuses ONE binary (deploy/m7-window/mesh) for every service — each entry only
# differs by SVC_NAME / LISTEN port / DOWNSTREAMS. The mesh binary's
# DisableKeepAlives makes every hop a distinct completing flow the observe path
# folds, so these are GENUINE multi-hop adjacencies the baseline learns, not
# painted-on. No engine/tap/adapter change — just more containers + the same image.
#
# DISTINCT-IDENTITY LOOPBACK SCHEME: each service LISTENs on its OWN 127.0.1.<K>
# address (K = port-8000: frontend 127.0.1.1:8001 ... profile 127.0.1.16:8016) and
# dials its downstreams FROM that address (mesh binds the LISTEN host as the dial
# source). It is NO LONGER "all loopback 127.0.0.1, port disambiguates": every
# service now has a distinct source AND destination IP, so the observe path sees a
# distinct src/dst per service and the node resolver names each one by IP alone —
# coalescing a service's egress (src, port 0) and listen (dst, portN) sides into
# ONE named node. The whole 127.0.0.0/8 is loopback on Linux, so 127.0.1.<K> binds
# with no `ip addr add` needed. Ingress (Envoy) originates 127.0.2.1 (see
# envoy.yaml) so the entry point is nameable too.
#
# ALL services use host networking (like m5-demo): it keeps the accepted sockets
# in the host netns/cgroup the observe + sockops + enforce programs watch, and
# avoids docker-proxy NAT rewriting the source tuple (the "cookies don't line up"
# footgun). The engine (cmd/staged-range) and the adapter run as host systemd
# units (they need CAP_BPF + the host cgroup-v2), not in this compose.
#
# Resource note: ~13 tiny Go mesh containers + envoy + the host engine/adapter/sim
# fit comfortably on an m7g.large (2 vCPU / 8 GiB) — each mesh process is a few MiB
# RSS and mostly idle between the diurnal-paced simdriver beats.
#
# restart: unless-stopped + the docker service enabled on boot keeps the mesh up
# across a server reboot, for the >=2-week window.
services:
  # ---- edge tier --------------------------------------------------------------
  frontend:
    build: { context: ../.., dockerfile: deploy/m7-window/mesh/Dockerfile }
    image: canarysting/mesh:latest
    network_mode: host
    environment:
      SVC_NAME: frontend
      LISTEN: "127.0.1.1:8001"
      DOWNSTREAMS: "http://127.0.1.8:8008,http://127.0.1.2:8002"
    restart: unless-stopped
    depends_on: [api, cdn-edge]

  cdn-edge:
    image: canarysting/mesh:latest
    network_mode: host
    environment:
      SVC_NAME: cdn-edge
      LISTEN: "127.0.1.8:8008"
      DOWNSTREAMS: "http://127.0.1.2:8002"
    restart: unless-stopped
    depends_on: [api]

  # ---- app tier ---------------------------------------------------------------
  api:
    image: canarysting/mesh:latest
    network_mode: host
    environment:
      SVC_NAME: api
      LISTEN: "127.0.1.2:8002"
      DOWNSTREAMS: "http://127.0.1.3:8003,http://127.0.1.4:8004,http://127.0.1.5:8005,http://127.0.1.6:8006,http://127.0.1.7:8007"
    restart: unless-stopped
    depends_on: [auth, db, cache, payments, search]

  orders:
    image: canarysting/mesh:latest
    network_mode: host
    environment:
      SVC_NAME: orders
      LISTEN: "127.0.1.13:8013"
      DOWNSTREAMS: "http://127.0.1.12:8012,http://127.0.1.6:8006"
    restart: unless-stopped
    depends_on: [inventory, payments]

  profile:
    image: canarysting/mesh:latest
    network_mode: host
    environment:
      SVC_NAME: profile
      LISTEN: "127.0.1.16:8016"
      DOWNSTREAMS: "http://127.0.1.11:8011,http://127.0.1.5:8005"
    restart: unless-stopped
    depends_on: [session-store, cache]

  notifications:
    image: canarysting/mesh:latest
    network_mode: host
    environment:
      SVC_NAME: notifications
      LISTEN: "127.0.1.15:8015"
      DOWNSTREAMS: "http://127.0.1.11:8011"
    restart: unless-stopped
    depends_on: [session-store]

  # ---- service tier -----------------------------------------------------------
  auth:
    image: canarysting/mesh:latest
    network_mode: host
    environment:
      SVC_NAME: auth
      LISTEN: "127.0.1.3:8003"
      DOWNSTREAMS: "http://127.0.1.11:8011"
    restart: unless-stopped
    depends_on: [session-store]

  payments:
    image: canarysting/mesh:latest
    network_mode: host
    environment:
      SVC_NAME: payments
      LISTEN: "127.0.1.6:8006"
      DOWNSTREAMS: "http://127.0.1.9:8009"
    restart: unless-stopped
    depends_on: [ledger]

  search:
    image: canarysting/mesh:latest
    network_mode: host
    environment:
      SVC_NAME: search
      LISTEN: "127.0.1.7:8007"
      DOWNSTREAMS: "http://127.0.1.10:8010"
    restart: unless-stopped
    depends_on: [db-replica]

  inventory:
    image: canarysting/mesh:latest
    network_mode: host
    environment:
      SVC_NAME: inventory
      LISTEN: "127.0.1.12:8012"
      DOWNSTREAMS: "http://127.0.1.4:8004"
    restart: unless-stopped
    depends_on: [db]

  analytics:
    image: canarysting/mesh:latest
    network_mode: host
    environment:
      SVC_NAME: analytics
      LISTEN: "127.0.1.14:8014"
      DOWNSTREAMS: "http://127.0.1.10:8010,http://127.0.1.5:8005"
    restart: unless-stopped
    depends_on: [db-replica, cache]

  # ---- data tier --------------------------------------------------------------
  ledger:
    image: canarysting/mesh:latest
    network_mode: host
    environment:
      SVC_NAME: ledger
      LISTEN: "127.0.1.9:8009"
      DOWNSTREAMS: "http://127.0.1.4:8004"
    restart: unless-stopped
    depends_on: [db]

  db-replica:
    image: canarysting/mesh:latest
    network_mode: host
    environment:
      SVC_NAME: db-replica
      LISTEN: "127.0.1.10:8010"
      DOWNSTREAMS: "http://127.0.1.5:8005"
    restart: unless-stopped
    depends_on: [cache]

  session-store:
    image: canarysting/mesh:latest
    network_mode: host
    environment: { SVC_NAME: session-store, LISTEN: "127.0.1.11:8011" }
    restart: unless-stopped

  db:
    image: canarysting/mesh:latest
    network_mode: host
    environment: { SVC_NAME: db, LISTEN: "127.0.1.4:8004" }
    restart: unless-stopped

  cache:
    image: canarysting/mesh:latest
    network_mode: host
    environment: { SVC_NAME: cache, LISTEN: "127.0.1.5:8005" }
    restart: unless-stopped

  envoy:
    image: envoyproxy/envoy:v1.34.1
    network_mode: host
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    command: ["envoy", "-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    restart: unless-stopped
    depends_on: [frontend]
