name: ci
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
  # TODO: add an eBPF build job (clang) for bpf/enforce once implemented.
