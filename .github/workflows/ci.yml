name: ci
on: [push, pull_request]

jobs:
  go:
    name: go (fmt, vet, build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make fmt-check
      - run: make vet
      - run: make build
      - run: make test

  ebpf:
    name: ebpf (clang build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install clang/llvm + libbpf headers
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev
      - name: clang version
        run: clang --version
      # Compiles bpf/enforce/*.bpf.c to BPF objects. While the kernel C is a
      # stub this is a toolchain smoke test; it does real work as enforce.bpf.c
      # is implemented (see docs/STING.md, docs/TECHNICAL_ARCHITECTURE.md).
      - run: make bpf
