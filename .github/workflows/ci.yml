name: ci
on: [push, pull_request]

jobs:
  go:
    name: go (fmt, vet, build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make fmt-check
      - run: make vet
      - run: make build
      - run: make test

  ebpf:
    name: ebpf (clang build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install clang/llvm + libbpf + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev \
            gcc make pkg-config git libelf-dev zlib1g-dev
      # The runner's packaged bpftool is unreliable: the bare `bpftool` apt name
      # is only a virtual package, and the /usr/sbin/bpftool wrapper from
      # linux-tools-common mis-resolves the Azure kernel flavor
      # (6.17.0-...-azure), failing with "bpftool not found for kernel ...".
      # Use a packaged bpftool only if it actually runs; otherwise build a
      # standalone one from the official repo. Any recent bpftool can dump the
      # running kernel's BTF, so it need not match the kernel version.
      - name: Provide a working bpftool
        run: |
          for cand in /usr/sbin/bpftool $(find /usr/lib /usr/local -type f -name bpftool 2>/dev/null); do
            if "$cand" version >/dev/null 2>&1; then
              echo "BPFTOOL=$cand" >> "$GITHUB_ENV"
              echo "using packaged bpftool: $cand"
              exit 0
            fi
          done
          echo "no working packaged bpftool — building from source"
          repo=https://github.com/libbpf/bpftool.git
          tag="$(git ls-remote --tags --refs "$repo" 'v*' | awk -F/ '{print $NF}' | sort -V | tail -n1)"
          echo "building bpftool $tag"
          git clone --depth 1 --branch "$tag" --recurse-submodules "$repo" "$RUNNER_TEMP/bpftool"
          make -C "$RUNNER_TEMP/bpftool/src" -j"$(nproc)"
          echo "BPFTOOL=$RUNNER_TEMP/bpftool/src/bpftool" >> "$GITHUB_ENV"
      - name: Tool versions
        run: |
          clang --version
          "$BPFTOOL" version
      # Every bpf/<x>/<x>.bpf.c does `#include "vmlinux.h"` for CO-RE kernel
      # types. That header is gitignored (host/kernel-specific), so CI generates
      # it from the runner's kernel BTF before the clang build, or `make bpf`
      # fails with: fatal error: 'vmlinux.h' file not found.
      - name: Generate vmlinux.h from kernel BTF
        run: |
          test -r /sys/kernel/btf/vmlinux || { echo "no kernel BTF at /sys/kernel/btf/vmlinux"; exit 1; }
          "$BPFTOOL" btf dump file /sys/kernel/btf/vmlinux format c > "$RUNNER_TEMP/vmlinux.h"
          # A quoted include resolves relative to the including file's own
          # directory, so place the header in every dir that has a .bpf.c source
          # (enforce/observe/sockops, and any added later).
          n=0
          for d in $(find bpf -name '*.bpf.c' -exec dirname {} \; | sort -u); do
            cp "$RUNNER_TEMP/vmlinux.h" "$d/vmlinux.h"
            n=$((n + 1))
          done
          echo "placed vmlinux.h ($(wc -l < "$RUNNER_TEMP/vmlinux.h") lines) into $n bpf source dir(s)"
      # Compiles bpf/enforce/*.bpf.c to BPF objects. While the kernel C is a
      # stub this is a toolchain smoke test; it does real work as enforce.bpf.c
      # is implemented (see docs/STING.md, docs/TECHNICAL_ARCHITECTURE.md).
      - run: make bpf

  # B4: privileged job that actually RUNS the kernel datapath. The ebpf job above
  # only COMPILES the C; this job loads the committed *_bpfel.o objects into the
  # kernel, attaches them to a cgroup-v2 hierarchy, and exercises the jail-precision
  # / fail-open / rate-limit-math / close-delete behavioral proofs that t.Skip()
  # off-root. These are the single most catastrophic-if-wrong code path, so a green
  # merge must mean they EXECUTED — not that they skipped.
  #
  # Config-complete on GitHub-hosted runners: ubuntu-latest is a real VM (not a
  # container), so its kernel exposes cgroup-v2 unified at /sys/fs/cgroup and BPF
  # syscalls. We run the test step inside a `privileged` container so the test
  # process holds CAP_BPF/CAP_NET_ADMIN/CAP_PERFMON and can attach to that cgroup.
  # No clang or vmlinux.h is needed at runtime: the BPF objects are committed and
  # embedded via //go:embed, so this job only needs a BPF-capable kernel + caps.
  ebpf-run:
    name: ebpf (privileged kernel datapath tests)
    runs-on: ubuntu-latest
    container:
      image: golang:1.24-bookworm
      # --privileged grants the caps + cgroup access the loaders need. The host
      # bind-mounts the cgroup-v2 hierarchy so the container's test sockets live
      # in the same cgroup the eBPF programs attach to.
      options: --privileged --cgroupns=host -v /sys/fs/cgroup:/sys/fs/cgroup:rw
    steps:
      - uses: actions/checkout@v5
      # Cache the Go module download cache. This job runs in a bare golang
      # container (not setup-go), so it gets no automatic module caching; without
      # this every run re-downloads every dependency before the kernel tests can
      # start. GOMODCACHE in the golang image is /go/pkg/mod. Key on go.sum so the
      # cache invalidates exactly when the dependency set changes.
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: /go/pkg/mod
          key: ${{ runner.os }}-ebpf-run-gomod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-ebpf-run-gomod-
      - name: Environment sanity (kernel, caps, cgroup-v2)
        run: |
          uname -a
          id
          echo "BPF syscall present:"; grep -q bpf /proc/kallsyms && echo yes || echo "(kallsyms restricted; continuing)"
          echo "cgroup-v2 controllers:"; cat /sys/fs/cgroup/cgroup.controllers || { echo "NO cgroup-v2 unified hierarchy at /sys/fs/cgroup"; exit 1; }
      # Run the root-gated behavioral tests. -count=1 disables the test cache so the
      # kernel assertions truly re-execute. -json emits a machine-readable event
      # stream (one JSON object per line, each with an "Action" of run/pass/fail/
      # skip/output) that the next step parses — so the false-green guard keys on
      # structured test results, not on human-readable log strings that could drift.
      # We run as root inside the privileged container.
      - name: Run kernel datapath tests
        run: |
          set -o pipefail
          go test -json -count=1 ./bpf/enforce/... ./bpf/observe/... ./bpf/sockops/... 2>&1 | tee /tmp/ebpf-test.json
      # The whole point of B4: a PASS that actually SKIPPED is a false green. Parse
      # the -json stream (not free-text skip strings): a single SKIP of any
      # root-gated test means the privileged datapath did not execute, so fail loud.
      # We also assert every load-bearing behavioral proof reported PASS — guarding
      # against the case where a test is renamed/removed and silently stops running.
      #
      # The parser is a stdlib-only Go program written to $RUNNER_TEMP (OUTSIDE the
      # module checkout, so it neither joins the build nor needs python3, which the
      # golang:bookworm image does not ship). go is guaranteed present in this image.
      - name: Assert the behavioral tests actually ran (no silent skip)
        run: |
          cat > "$RUNNER_TEMP/checkresults.go" <<'GO'
          // Parses `go test -json` events: enforces zero skips and a PASS floor for
          // every load-bearing eBPF datapath proof. Stdlib only; run via `go run`.
          package main

          import (
          	"bufio"
          	"encoding/json"
          	"fmt"
          	"os"
          	"sort"
          )

          type event struct {
          	Action string `json:"Action"`
          	Test   string `json:"Test"`
          }

          func main() {
          	// The single most catastrophic-if-wrong proofs. Each MUST pass; none may skip.
          	required := map[string]bool{
          		"TestEnforceJailIsPrecise":         false, // enforce: jail one socket, spare bystanders
          		"TestFailOpenOnMiss":               false, // enforce: unknown cookie => allow (fail-open)
          		"TestRateLimitSustainedThroughput": false, // enforce: rate-limit math, not a jail
          		"TestCloseDeleteRemovesEntry":      false, // enforce: close reclaims the verdict entry
          		"TestSockopsCookieOracle":          false, // sockops: cookie identity-join ground truth
          		"TestObserveNeverDropsAPacket":     false, // observe: OBSERVE-ONLY path is non-blocking
          	}

          	f, err := os.Open(os.Args[1])
          	if err != nil {
          		fmt.Printf("::error::cannot open test stream: %v\n", err)
          		os.Exit(1)
          	}
          	defer f.Close()

          	var skipped, failed []string
          	passCount := 0
          	sc := bufio.NewScanner(f)
          	sc.Buffer(make([]byte, 0, 1024*1024), 16*1024*1024)
          	for sc.Scan() {
          		line := sc.Bytes()
          		if len(line) == 0 || line[0] != '{' {
          			continue // non-JSON banner (e.g. build output); test results are JSON objects
          		}
          		var ev event
          		if err := json.Unmarshal(line, &ev); err != nil {
          			fmt.Printf("::error::malformed JSON in test stream: %v\n", err)
          			os.Exit(1)
          		}
          		if ev.Test == "" {
          			continue // package-level event, not a single test
          		}
          		switch ev.Action {
          		case "pass":
          			passCount++
          			if _, ok := required[ev.Test]; ok {
          				required[ev.Test] = true
          			}
          		case "skip":
          			skipped = append(skipped, ev.Test)
          		case "fail":
          			failed = append(failed, ev.Test)
          		}
          	}
          	if err := sc.Err(); err != nil {
          		fmt.Printf("::error::reading test stream: %v\n", err)
          		os.Exit(1)
          	}

          	ok := true
          	if len(failed) > 0 {
          		sort.Strings(failed)
          		fmt.Printf("::error::tests FAILED: %v\n", failed)
          		ok = false
          	}
          	// Any skip among the root-gated packages means the datapath did not run.
          	if len(skipped) > 0 {
          		sort.Strings(skipped)
          		fmt.Printf("::error::root-gated eBPF tests SKIPPED (euid!=0 / no caps / no cgroup-v2) "+
          			"— the privileged datapath did not execute (false green): %v\n", skipped)
          		ok = false
          	}
          	// PASS floor: every load-bearing proof must have actually passed.
          	var missing []string
          	for name, sawPass := range required {
          		if !sawPass {
          			missing = append(missing, name)
          		}
          	}
          	if len(missing) > 0 {
          		sort.Strings(missing)
          		fmt.Printf("::error::required behavioral proofs did not report PASS "+
          			"(renamed/removed or never ran?): %v\n", missing)
          		ok = false
          	}
          	if !ok {
          		os.Exit(1)
          	}
          	fmt.Printf("kernel datapath behavioral tests executed and passed "+
          		"(%d pass, 0 skip, 0 fail; all %d required proofs green).\n", passCount, len(required))
          }
          GO
          go run "$RUNNER_TEMP/checkresults.go" /tmp/ebpf-test.json
